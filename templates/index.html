<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MPG Predictor</title>
    <style>
        :root {
            --primary: #1A56DB;
            --success: #0E9F6E;
            --glass: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 100%;
            max-width: 450px;
            color: white;
            margin: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.8rem;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 20px;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            background: rgba(14, 159, 110, 0.2);
            border-left: 5px solid var(--success);
            text-align: center;
            border-radius: 4px;
        }

        .result h3 {
            margin: 0;
            color: #4ade80;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>MPG Predictor</h2>
    <form action="/predict" method="post">
        <div class="form-grid">
            <div class="form-group">
                <label>Cylinders</label>
                <input type="number" name="cylinders" placeholder="4" required>
            </div>
            <div class="form-group">
                <label>Displacement</label>
                <input type="number" step="any" name="displacement" placeholder="160" required>
            </div>
            <div class="form-group">
                <label>Horsepower</label>
                <input type="number" step="any" name="horsepower" placeholder="110" required>
            </div>
            <div class="form-group">
                <label>Weight (lbs)</label>
                <input type="number" step="any" name="weight" placeholder="2800" required>
            </div>
            <div class="form-group">
                <label>Acceleration</label>
                <input type="number" step="any" name="acceleration" placeholder="15.5" required>
            </div>
            <div class="form-group">
                <label>Model Year</label>
                <input type="number" name="model_year" placeholder="80" required>
            </div>
            <div class="form-group full-width">
                <label>Origin (1:USA, 2:Eur, 3:Asia)</label>
                <input type="number" name="origin" min="1" max="3" placeholder="1" required>
            </div>
        </div>
        <button type="submit">CALCULATE EFFICIENCY</button>
    </form>

    {% if prediction_text %}
    <div class="result">
        <h3>{{ prediction_text }}</h3>
    </div>
    {% endif %}
</div>

</body>
</html>
