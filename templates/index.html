<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MPG Predictor</title>
    <style>
        :root {
            --primary: #1A56DB;
            --success: #0E9F6E;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            /* Background image with a dark overlay for readability */
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            width: 90%; /* Mobile width */
            max-width: 500px; /* Desktop limit */
            margin: 20px auto;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            font-size: 1.5rem;
        }

        /* Responsive Grid: 1 column on mobile, 2 on tablets/desktops */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 12px;
        }

        @media (min-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
            .full-width-mobile {
                grid-column: span 2;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
        }

        input {
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            -webkit-appearance: none; /* Removes mobile safari styling */
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 20px;
            transition: transform 0.2s, background 0.3s, box-shadow 0.3s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            background: #2563eb;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            background: rgba(14, 159, 110, 0.2);
            border: 1px solid var(--success);
            text-align: center;
            border-radius: 12px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .result h3 {
            margin: 0;
            color: #4ade80;
            font-size: 1.1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Utility to ensure origin input is always full width */
        .origin-field {
            grid-column: span 1;
        }
        @media (min-width: 480px) {
            .origin-field { grid-column: span 2; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>MPG Predictor</h2>
    <form action="/predict" method="post">
        <div class="form-grid">
            <div class="form-group">
                <label>Cylinders</label>
                <input type="number" name="cylinders" placeholder="e.g. 4" required>
            </div>
            <div class="form-group">
                <label>Displacement</label>
                <input type="number" step="any" name="displacement" placeholder="160" required>
            </div>
            <div class="form-group">
                <label>Horsepower</label>
                <input type="number" step="any" name="horsepower" placeholder="110" required>
            </div>
            <div class="form-group">
                <label>Weight (lbs)</label>
                <input type="number" step="any" name="weight" placeholder="2800" required>
            </div>
            <div class="form-group">
                <label>Acceleration</label>
                <input type="number" step="any" name="acceleration" placeholder="15.5" required>
            </div>
            <div class="form-group">
                <label>Model Year (YY)</label>
                <input type="number" name="model_year" placeholder="80" required>
            </div>
            <div class="form-group origin-field">
                <label>Origin (1:USA, 2:Eur, 3:Asia)</label>
                <input type="number" name="origin" min="1" max="3" placeholder="1" required>
            </div>
        </div>
        <button type="submit">CALCULATE MPG</button>
    </form>

    {% if prediction_text %}
    <div class="result">
        <h3>{{ prediction_text }}</h3>
    </div>
    {% endif %}
</div>

</body>
</html>
